<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Logar Automaticamente</title>
  <link rel="stylesheet" href="../css/pages/logar-automaticamente.css">
</head>
<body>
  <div class="card">
    <h1>🚀 Entrar Automaticamente</h1>
    <p class="success">Clique no botão abaixo para criar a conta e entrar direto na loja!</p>
    
    <div class="info">
      <p><strong>Conta que será criada:</strong></p>
      <p>E-mail: teste@zcore.com.br</p>
      <p>Senha: 123456</p>
      <p>Nome: Teste Z-Core</p>
    </div>
    
    <button id="btnLogar" class="btn-success" onclick="logarAutomaticamente()">✨ CRIAR CONTA E ENTRAR</button>
    <button onclick="window.location.href='../../index.html'">Ir para Loja</button>
    <button onclick="window.location.href='diagnostico.html'">Diagnóstico</button>
    <button onclick="window.location.href='criar-conta-teste.html'">Criar Conta</button>
    
    <div id="status" class="status-wrap"></div>
  </div>

  <script>
    function logarAutomaticamente() {
      const status = document.getElementById('status');
      status.innerHTML = '<p>⏳ Criando conta...</p>';
      
      // 1. Pegar contas existentes
      let usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
      
      // 2. Remover conta de teste se já existir
      usuarios = usuarios.filter(u => u.email !== 'teste@zcore.com.br');
      
      // 3. Criar nova conta de teste
      const novaConta = {
        id: Date.now(),
        nome: 'Teste Z-Core',
        email: 'teste@zcore.com.br',
        cpf: '123.456.789-00',
        telefone: '(11) 99999-9999',
        senha: '123456',
        pedidos: []
      };
      usuarios.push(novaConta);
      localStorage.setItem('usuarios', JSON.stringify(usuarios));
      
      // 4. Fazer login (salvar sessão)
      localStorage.setItem('usuarioLogado', JSON.stringify(novaConta));
      
      status.innerHTML = '<p class="success">✅ CONTA CRIADA E LOGIN FEITO! Redirecionando...</p>';
      
      // 5. Redirecionar para a loja
      setTimeout(() => {
        window.location.href = '../../index.html';
      }, 1500);
    }
  </script>
</body>
</html>
