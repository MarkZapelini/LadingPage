<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{var t=localStorage.getItem('zcore-theme');document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha — Z-Core</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { min-height: 100vh; background: var(--bg); transition: background 0.2s; }
    [data-theme="light"] body { background: linear-gradient(135deg, #0A0A0A 0%, #1a0033 100%); }
    [data-theme="dark"] body { background: linear-gradient(135deg, #050508 0%, #12001f 100%); }
    .reset-theme-wrap { position: fixed; top: 20px; right: 20px; z-index: 100; }
    .reset-container { max-width: 420px; margin: 60px auto; padding: 0 20px; }
    .reset-card { background: var(--surface); border-radius: 16px; padding: 32px; box-shadow: 0 25px 80px rgba(0,0,0,0.3); border: 1px solid var(--border); }
    .reset-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .reset-desc { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; transition: all .2s; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--input-color); }
    .form-group input:focus { border-color: #A020F0; box-shadow: 0 0 0 3px rgba(160,32,240,0.1); }
    .btn-reset { width: 100%; padding: 13px; background: linear-gradient(135deg,#A020F0,#7a17b5); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform .2s,box-shadow .2s; font-family: 'DM Sans', sans-serif; }
    .btn-reset:hover { transform: translateY(-1px); box-shadow: 0 10px 25px rgba(160,32,240,0.4); }
    .back-link { display: block; text-align: center; margin-top: 20px; color: var(--footer-text); text-decoration: none; font-size: 14px; opacity: 0.9; }
    .back-link:hover { opacity: 1; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .success { background: #ecfdf5; border: 1px solid #a7f3d0; color: #10b981; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  </style>
</head>
<body>

<div class="reset-theme-wrap">
  <button type="button" class="theme-toggle" aria-label="Ativar modo escuro" title="Modo escuro">
    <i class="fas fa-sun theme-icon-light" aria-hidden="true"></i>
    <i class="fas fa-moon theme-icon-dark" aria-hidden="true"></i>
  </button>
</div>

<div class="reset-container">
  <div class="reset-card" id="resetCard">
    <div class="reset-title"><i class="fas fa-key" style="color:#A020F0;margin-right:8px"></i>Redefinir Senha</div>
    <div class="reset-desc">Digite sua nova senha abaixo</div>
    
    <div id="mensagem"></div>
    
    <div id="formRedefinir">
      <div class="form-group">
        <label>Nova Senha</label>
        <input type="password" id="novaSenha" placeholder="Mínimo 4 caracteres">
      </div>
      <div class="form-group">
        <label>Confirmar Nova Senha</label>
        <input type="password" id="confirmarSenha" placeholder="Digite novamente">
      </div>
      <button class="btn-reset" onclick="redefinirSenha()">
        <i class="fas fa-check" style="margin-right:8px"></i>Redefinir Senha
      </button>
    </div>
  </div>
  <a href="login.html" class="back-link">← Voltar ao Login</a>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  function mostrarToast(mensagem, tipo = 'sucesso') {
    const toast = document.getElementById('toast');
    toast.textContent = mensagem;
    toast.className = 'toast ' + tipo;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function mostrarMensagem(texto, tipo) {
    const div = document.getElementById('mensagem');
    div.className = tipo;
    div.textContent = texto;
    div.style.display = 'block';
  }

  function getParametroUrl(nome) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(nome);
  }

  let tokenValido = null;
  let emailValido = null;

  window.onload = function() {
    const token = getParametroUrl('token');
    const email = getParametroUrl('email');

    if (!token || !email) {
      mostrarMensagem('Link inválido ou expirado!', 'error');
      document.getElementById('formRedefinir').style.display = 'none';
      return;
    }

    const resetTokens = JSON.parse(localStorage.getItem('resetTokens') || '[]');
    const tokenEncontrado = resetTokens.find(t => t.token === token && t.email === email);

    if (!tokenEncontrado) {
      mostrarMensagem('Link inválido ou expirado!', 'error');
      document.getElementById('formRedefinir').style.display = 'none';
      return;
    }

    tokenValido = token;
    emailValido = email;
  };

  async function redefinirSenha() {
    const senha1 = document.getElementById('novaSenha').value;
    const senha2 = document.getElementById('confirmarSenha').value;

    if (!senha1 || !senha2) {
      mostrarMensagem('Preencha todos os campos!', 'error');
      return;
    }

    if (senha1.length < 4) {
      mostrarMensagem('Senha muito curta!', 'error');
      return;
    }

    if (senha1 !== senha2) {
      mostrarMensagem('As senhas não coincidem!', 'error');
      return;
    }

    if (typeof ZCoreAPI !== 'undefined') {
      await ZCoreAPI.init();
      if (ZCoreAPI._online) {
        try {
          await ZCoreAPI.resetPassword({ token: tokenValido, email: emailValido, senha: senha1 });
          mostrarMensagem('Senha redefinida com sucesso!', 'success');
          document.getElementById('formRedefinir').style.display = 'none';
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          return;
        } catch (e) {
          mostrarMensagem(e.message, 'error');
          return;
        }
      }
    }

    const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
    const usuarioIndex = usuarios.findIndex(u => u.email === emailValido);

    if (usuarioIndex === -1) {
      mostrarMensagem('Usuário não encontrado!', 'error');
      return;
    }

    usuarios[usuarioIndex].senha = senha1;
    localStorage.setItem('usuarios', JSON.stringify(usuarios));

    const resetTokens = JSON.parse(localStorage.getItem('resetTokens') || '[]');
    const tokensAtualizados = resetTokens.filter(t => t.token !== tokenValido);
    localStorage.setItem('resetTokens', JSON.stringify(tokensAtualizados));

    mostrarMensagem('Senha redefinida com sucesso!', 'success');
    document.getElementById('formRedefinir').style.display = 'none';

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2000);
  }
</script>
<script src="js/api.js"></script>
<script src="js/tema.js"></script>

</body>
</html>
