<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil — Z-Core</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,500italic&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/pages/perfil-page.css">
</head>
<body>

<div class="bg-fx"></div>

<div class="wrap">

  <a href="../index.html" class="back-link reveal">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    Voltar à loja
  </a>
  <h1 class="page-title reveal">Meu Perfil</h1>

  <!-- HEADER -->
  <div class="profile-header reveal reveal-1">
    <div class="avatar-shell" id="avatarShell">
      <div class="avatar-ring">
        <div class="avatar" id="avatarInitial">U</div>
      </div>
      <div class="avatar-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </div>
      <div class="avatar-edit" title="Alterar foto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </div>
      <input type="file" id="avatarInput" accept="image/*" class="perfil-avatar-input-hidden">
    </div>

    <div class="profile-meta">
      <p class="profile-name" id="headerName">Usuário</p>
      <p class="profile-email" id="headerEmail">email@exemplo.com</p>
      <span class="profile-badge"><span class="dot"></span>Conta verificada</span>
    </div>

    <div class="completion">
      <div class="completion-label">Perfil completo</div>
      <div class="completion-bar"><div class="completion-fill" id="completionFill"></div></div>
      <div class="completion-pct" id="completionPct">18% preenchido</div>
    </div>
  </div>

  <div class="grid">

    <!-- DADOS PESSOAIS -->
    <div class="card reveal reveal-2">
      <h2 class="card-title">Dados Pessoais</h2>
      <p class="card-sub">Usados para identificação e contato.</p>

      <div class="field" data-field="nome">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Seu nome completo">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
      </div>

      <div class="field" data-field="email">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
      </div>

      <div class="field" data-field="cpf">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
      </div>

      <div class="field" data-field="telefone">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" inputmode="numeric">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
    </div>

    <!-- ENDEREÇO -->
    <div class="card reveal reveal-3">
      <h2 class="card-title">Endereço</h2>
      <p class="card-sub">Usado para cálculo de frete e entregas.</p>

      <div class="field" data-field="cep">
        <label for="cep">CEP</label>
        <input type="text" id="cep" placeholder="00000-000" maxlength="9" inputmode="numeric">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
        <div class="hint" id="cepHint">Digite o CEP para preencher o endereço automaticamente.</div>
      </div>

      <div class="field" data-field="rua">
        <label for="rua">Rua</label>
        <input type="text" id="rua" placeholder="Nome da rua">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
      </div>

      <div class="field-row">
        <div class="field" data-field="numero">
          <label for="numero">Número</label>
          <input type="text" id="numero" placeholder="Número" inputmode="numeric">
          <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <div class="field" data-field="complemento">
          <label for="complemento">Complemento</label>
          <input type="text" id="complemento" placeholder="Apto, bloco, etc.">
        </div>
      </div>

      <div class="field" data-field="bairro">
        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" placeholder="Bairro">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
      </div>

      <div class="field-row">
        <div class="field" data-field="cidade">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" placeholder="Cidade">
          <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <div class="field" data-field="estado">
          <label for="estado">Estado</label>
          <div class="custom-select" id="estadoSelect">
            <div class="select-trigger" id="estadoTrigger">
              <span id="estadoValue">Selecione</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div class="select-panel" id="estadoPanel"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BARRA DE SALVAR -->
<div class="save-bar">
  <div class="save-bar-inner">
    <div class="save-status" id="saveStatus">
      <span class="pulse"></span>
      <span>Nenhuma alteração</span>
    </div>
    <button class="save-btn" id="saveBtn">
      <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
      Salvar Alterações
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ---------- helpers de máscara ----------
  const maskCPF = (v) =>
    v.replace(/\D/g, "").slice(0, 11)
      .replace(/(\d{3})(\d)/, "$1.$2")
      .replace(/(\d{3})(\d)/, "$1.$2")
      .replace(/(\d{3})(\d{1,2})$/, "$1-$2");

  const maskPhone = (v) => {
    v = v.replace(/\D/g, "").slice(0, 11);
    return v.length > 10
      ? v.replace(/(\d{2})(\d{5})(\d{4})/, "($1) $2-$3")
      : v.replace(/(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
  };

  const maskCEP = (v) =>
    v.replace(/\D/g, "").slice(0, 8).replace(/(\d{5})(\d{1,3})/, "$1-$2");

  const ESTADOS = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];
  const EMPTY_FORM = {
    nome: "", email: "", cpf: "", telefone: "",
    cep: "", rua: "", numero: "", complemento: "", bairro: "", cidade: "", estado: "", avatar: ""
  };

  // ---------- estado da página ----------
  let form = { ...EMPTY_FORM };
  let dirty = false;
  let savedFlash = false;
  let cepLoading = false;
  let usuarioLogado = null;

  // ---------- DOM refs ----------
  const dom = {
    avatarShell: document.getElementById("avatarShell"),
    avatarInput: document.getElementById("avatarInput"),
    avatarInitial: document.getElementById("avatarInitial"),
    headerName: document.getElementById("headerName"),
    headerEmail: document.getElementById("headerEmail"),
    completionFill: document.getElementById("completionFill"),
    completionPct: document.getElementById("completionPct"),
    cepHint: document.getElementById("cepHint"),
    saveStatus: document.getElementById("saveStatus"),
    saveBtn: document.getElementById("saveBtn"),
    estadoSelect: document.getElementById("estadoSelect"),
    estadoTrigger: document.getElementById("estadoTrigger"),
    estadoPanel: document.getElementById("estadoPanel"),
    estadoValue: document.getElementById("estadoValue"),
    toast: document.getElementById("toast"),
  };

  // ---------- cálculo de completude ----------
  const calculateCompletion = () => {
    const values = Object.values(form);
    const filled = values.filter((v) => v && v.trim() !== "").length;
    return Math.round((filled / values.length) * 100);
  };

  const updateCompletion = () => {
    const pct = calculateCompletion();
    dom.completionFill.style.width = `${pct}%`;
    dom.completionPct.textContent = `${pct}% preenchido`;
  };

  // ---------- atualização visual dos campos (check-icon) ----------
  const updateFieldCheck = (fieldName) => {
    const fieldEl = document.querySelector(`[data-field="${fieldName}"]`);
    if (!fieldEl) return;
    const hasValue = form[fieldName] && form[fieldName].trim() !== "";
    fieldEl.classList.toggle("filled", hasValue);
  };

  // ---------- estado "dirty" e UI de salvar ----------
  const markDirty = () => {
    dirty = true;
    savedFlash = false;
    updateSaveUI();
  };

  const updateSaveUI = () => {
    const status = dom.saveStatus;
    const btn = dom.saveBtn;
    status.classList.remove("dirty", "saved");
    if (savedFlash) {
      status.classList.add("saved");
      status.querySelector("span:last-child").textContent = "Alterações salvas";
      btn.classList.add("success");
    } else if (dirty) {
      status.classList.add("dirty");
      status.querySelector("span:last-child").textContent = "Alterações não salvas";
      btn.classList.remove("success");
    } else {
      status.querySelector("span:last-child").textContent = "Nenhuma alteração";
      btn.classList.remove("success");
    }
  };

  // ---------- preencher formulário com dados ----------
  const fillForm = (data) => {
    form = { ...EMPTY_FORM, ...data };
    Object.keys(form).forEach((key) => {
      const input = document.getElementById(key);
      if (input && input.tagName === "INPUT") {
        input.value = form[key] || "";
      }
      updateFieldCheck(key);
    });
    // update custom select
    if (form.estado) {
      dom.estadoValue.textContent = form.estado;
      dom.estadoTrigger.classList.add("has-value");
      // mark selected option
      const options = dom.estadoPanel.querySelectorAll(".select-option");
      options.forEach(opt => opt.classList.toggle("selected", opt.dataset.value === form.estado));
    }
    // Carrega o avatar se existir
    if (data.avatar) {
      dom.avatarInitial.style.backgroundImage = `url(${data.avatar})`;
      dom.avatarInitial.textContent = "";
    }
    // update header
    updateHeader();
    updateCompletion();
    updateSaveUI();
  };

  const updateHeader = () => {
    if (!form.avatar) {
      const initial = (form.nome || "U").trim().charAt(0).toUpperCase();
      dom.avatarInitial.textContent = initial;
    }
    dom.headerName.textContent = form.nome || "Usuário";
    dom.headerEmail.textContent = form.email || "email@exemplo.com";
  };

  // ---------- custom select estado ----------
  const buildEstadoOptions = () => {
    dom.estadoPanel.innerHTML = "";
    ESTADOS.forEach((uf) => {
      const option = document.createElement("div");
      option.className = "select-option";
      option.dataset.value = uf;
      option.textContent = uf;
      option.addEventListener("click", () => {
        form.estado = uf;
        dom.estadoValue.textContent = uf;
        dom.estadoTrigger.classList.add("has-value");
        closeEstadoPanel();
        updateFieldCheck("estado");
        markDirty();
        updateCompletion();
      });
      if (form.estado === uf) option.classList.add("selected");
      dom.estadoPanel.appendChild(option);
    });
  };

  const openEstadoPanel = () => {
    dom.estadoTrigger.classList.add("open");
    dom.estadoPanel.classList.add("open");
  };

  const closeEstadoPanel = () => {
    dom.estadoTrigger.classList.remove("open");
    dom.estadoPanel.classList.remove("open");
  };

  // ---------- busca de CEP ----------
  const handleCepChange = async (raw) => {
    const masked = maskCEP(raw);
    document.getElementById("cep").value = masked;
    form.cep = masked;
    updateFieldCheck("cep");
    markDirty();
    updateCompletion();

    const digits = masked.replace(/\D/g, "");
    if (digits.length !== 8) {
      dom.cepHint.classList.remove("loading", "success", "error");
      dom.cepHint.textContent = "Digite o CEP para preencher o endereço automaticamente.";
      return;
    }

    cepLoading = true;
    dom.cepHint.classList.add("loading");
    dom.cepHint.textContent = "Buscando endereço...";

    try {
      const res = await fetch(`https://viacep.com.br/ws/${digits}/json/`);
      const data = await res.json();
      if (data.erro) {
        dom.cepHint.classList.remove("loading");
        dom.cepHint.classList.add("error");
        dom.cepHint.textContent = "CEP não encontrado, preencha manualmente.";
      } else {
        form.rua = data.logradouro || "";
        form.bairro = data.bairro || "";
        form.cidade = data.localidade || "";
        form.estado = data.uf || "";

        document.getElementById("rua").value = form.rua;
        document.getElementById("bairro").value = form.bairro;
        document.getElementById("cidade").value = form.cidade;
        if (form.estado) {
          dom.estadoValue.textContent = form.estado;
          dom.estadoTrigger.classList.add("has-value");
          const options = dom.estadoPanel.querySelectorAll(".select-option");
          options.forEach(opt => opt.classList.toggle("selected", opt.dataset.value === form.estado));
        }

        ["rua", "bairro", "cidade", "estado"].forEach(updateFieldCheck);
        updateCompletion();

        dom.cepHint.classList.remove("loading");
        dom.cepHint.classList.add("success");
        dom.cepHint.textContent = "Endereço encontrado automaticamente.";
      }
    } catch {
      dom.cepHint.classList.remove("loading");
      dom.cepHint.classList.add("error");
      dom.cepHint.textContent = "Não foi possível buscar o CEP agora.";
    } finally {
      cepLoading = false;
    }
  };

  // ---------- salvar perfil ----------
  const salvarPerfil = async () => {
    dom.saveBtn.disabled = true;

    // Atualiza no localStorage
    if (usuarioLogado) {
      // Preserva o avatar ao atualizar os dados do formulário
      const avatarAtual = usuarioLogado.avatar;
      usuarioLogado = { ...usuarioLogado, ...form, avatar: avatarAtual };
      localStorage.setItem("usuarioLogado", JSON.stringify(usuarioLogado));

      // Atualiza na lista de usuários
      let usuarios = JSON.parse(localStorage.getItem("usuarios") || "[]");
      const usuarioIndex = usuarios.findIndex(u => u.id === usuarioLogado.id);
      if (usuarioIndex !== -1) {
        usuarios[usuarioIndex] = usuarioLogado;
        localStorage.setItem("usuarios", JSON.stringify(usuarios));
      }
    }

    // Tenta usar a API se estiver online
    try {
      if (typeof ZCoreAPI !== "undefined") {
        await ZCoreAPI.init();
        if (ZCoreAPI._online) {
          const data = await ZCoreAPI.updateProfile(form);
          const usuarioAPI = data.usuario || data;
          usuarioLogado = { ...usuarioLogado, ...usuarioAPI };
          localStorage.setItem("usuarioLogado", JSON.stringify(usuarioLogado));
        }
      }
    } catch (err) {
      console.error("Erro ao atualizar via API:", err);
    }

    // Feedback visual
    dirty = false;
    savedFlash = true;
    updateSaveUI();

    // Pulse no último campo editado
    const inputs = document.querySelectorAll("input");
    if (inputs.length) {
      inputs[inputs.length - 1].classList.add("valid-pulse");
      setTimeout(() => inputs[inputs.length - 1].classList.remove("valid-pulse"), 500);
    }

    // Reset saved flash após tempo
    setTimeout(() => {
      savedFlash = false;
      updateSaveUI();
    }, 2500);

    dom.saveBtn.disabled = false;
  };

  // ---------- avatar upload ----------
  const handleAvatarClick = () => dom.avatarInput.click();
  const handleAvatarFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const imgUrl = ev.target.result;
      dom.avatarInitial.style.backgroundImage = `url(${imgUrl})`;
      dom.avatarInitial.textContent = "";
      // Salva no localStorage
      if (usuarioLogado) {
        usuarioLogado.avatar = imgUrl;
        localStorage.setItem("usuarioLogado", JSON.stringify(usuarioLogado));
        
        // Atualiza na lista de usuários também
        let usuarios = JSON.parse(localStorage.getItem("usuarios") || "[]");
        const usuarioIndex = usuarios.findIndex(u => u.id === usuarioLogado.id);
        if (usuarioIndex !== -1) {
          usuarios[usuarioIndex].avatar = imgUrl;
          localStorage.setItem("usuarios", JSON.stringify(usuarios));
        }
      }
      // Marca como dirty para que o usuário salve as alterações
      markDirty();
    };
    reader.readAsDataURL(file);
  };

  // ---------- toast ----------
  const mostrarToast = (mensagem, tipo = "sucesso") => {
    dom.toast.textContent = mensagem;
    dom.toast.style.background = tipo === "sucesso" ? "#34d399" : tipo === "erro" ? "#ef4444" : "#fbbf24";
    dom.toast.style.color = "#08080d";
    dom.toast.style.padding = "12px 24px";
    dom.toast.style.borderRadius = "10px";
    dom.toast.style.position = "fixed";
    dom.toast.style.bottom = "100px";
    dom.toast.style.left = "50%";
    dom.toast.style.transform = "translateX(-50%)";
    dom.toast.style.zIndex = "100";
    dom.toast.style.fontFamily = "'Inter', sans-serif";
    dom.toast.style.fontWeight = "600";
    dom.toast.style.fontSize = "14px";
    dom.toast.style.boxShadow = "0 10px 30px rgba(0,0,0,.4)";
    dom.toast.style.opacity = "1";
    dom.toast.style.transition = "opacity .3s";
    setTimeout(() => {
      dom.toast.style.opacity = "0";
    }, 3000);
  };

  // ---------- verificar login e carregar dados ----------
  const verificarLogin = async () => {
    const usuarioLogadoStr = localStorage.getItem("usuarioLogado");
    if (!usuarioLogadoStr) {
      mostrarToast("❌ Você precisa estar logado!", "erro");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
      return;
    }

    usuarioLogado = JSON.parse(usuarioLogadoStr);

    // Tenta carregar dados da API se estiver online
    try {
      if (typeof ZCoreAPI !== "undefined") {
        await ZCoreAPI.init();
        if (ZCoreAPI._online) {
          const data = await ZCoreAPI.getMe();
          const usuarioAPI = data.usuario || data;
          usuarioLogado = { ...usuarioLogado, ...usuarioAPI };
          localStorage.setItem("usuarioLogado", JSON.stringify(usuarioLogado));
        }
      }
    } catch (err) {
      console.error("Erro ao carregar perfil via API:", err);
    }

    // Preenche o formulário
    fillForm(usuarioLogado);

    // Carrega avatar se existir
    if (usuarioLogado.avatar) {
      dom.avatarInitial.style.backgroundImage = `url(${usuarioLogado.avatar})`;
      dom.avatarInitial.textContent = "";
    }
  };

  // ---------- eventos ----------
  const initEvents = () => {
    // Nome
    document.getElementById("nome").addEventListener("input", (e) => {
      form.nome = e.target.value;
      updateFieldCheck("nome");
      updateHeader();
      markDirty();
      updateCompletion();
    });

    // Email
    document.getElementById("email").addEventListener("input", (e) => {
      form.email = e.target.value;
      updateFieldCheck("email");
      updateHeader();
      markDirty();
      updateCompletion();
    });

    // CPF
    document.getElementById("cpf").addEventListener("input", (e) => {
      const masked = maskCPF(e.target.value);
      document.getElementById("cpf").value = masked;
      form.cpf = masked;
      updateFieldCheck("cpf");
      markDirty();
      updateCompletion();
    });

    // Telefone
    document.getElementById("telefone").addEventListener("input", (e) => {
      const masked = maskPhone(e.target.value);
      document.getElementById("telefone").value = masked;
      form.telefone = masked;
      updateFieldCheck("telefone");
      markDirty();
      updateCompletion();
    });

    // CEP
    document.getElementById("cep").addEventListener("input", (e) => handleCepChange(e.target.value));

    // Rua
    document.getElementById("rua").addEventListener("input", (e) => {
      form.rua = e.target.value;
      updateFieldCheck("rua");
      markDirty();
      updateCompletion();
    });

    // Número
    document.getElementById("numero").addEventListener("input", (e) => {
      form.numero = e.target.value;
      updateFieldCheck("numero");
      markDirty();
      updateCompletion();
    });

    // Complemento
    document.getElementById("complemento").addEventListener("input", (e) => {
      form.complemento = e.target.value;
      markDirty();
      updateCompletion();
    });

    // Bairro
    document.getElementById("bairro").addEventListener("input", (e) => {
      form.bairro = e.target.value;
      updateFieldCheck("bairro");
      markDirty();
      updateCompletion();
    });

    // Cidade
    document.getElementById("cidade").addEventListener("input", (e) => {
      form.cidade = e.target.value;
      updateFieldCheck("cidade");
      markDirty();
      updateCompletion();
    });

    // Custom select estado
    dom.estadoTrigger.addEventListener("click", () => {
      if (dom.estadoPanel.classList.contains("open")) closeEstadoPanel();
      else openEstadoPanel();
    });

    // Fechar select ao clicar fora
    document.addEventListener("click", (e) => {
      if (!dom.estadoSelect.contains(e.target)) closeEstadoPanel();
    });

    // Avatar
    dom.avatarShell.addEventListener("click", handleAvatarClick);
    dom.avatarInput.addEventListener("change", handleAvatarFile);

    // Salvar
    dom.saveBtn.addEventListener("click", salvarPerfil);
  };

  // ---------- inicializar ----------
  const init = () => {
    buildEstadoOptions();
    initEvents();
    verificarLogin();
  };

  window.onload = init;
</script>
<script src="../js/api.js"></script>

</body>
</html>
