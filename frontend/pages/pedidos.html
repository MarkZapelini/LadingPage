<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('zcore-theme');document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Pedidos — Z-Core</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- NAV -->
<nav class="premium-header">
  <div class="header-container">
    <a href="../index.html" class="logo">
      <span class="logo-symbol">Z</span>
      <span class="logo-text">Core</span>
    </a>

    <ul class="nav-links">
      <li><a href="../index.html">Início</a></li>
      <li><a href="../index.html#produtos">Produtos</a></li>
      <li><a href="../index.html#ofertas">Ofertas</a></li>
      <li><a href="#">Contato</a></li>
    </ul>

    <div class="nav-actions">
      <button type="button" class="theme-toggle" aria-label="Ativar modo escuro" title="Modo escuro">
        <i class="fas fa-sun theme-icon-light"></i>
        <i class="fas fa-moon theme-icon-dark"></i>
      </button>

      <div id="userLogged" class="user-group">
        <div class="user-info-premium">
          <div class="user-avatar-premium" id="userAvatar">U</div>
          <span class="user-name-premium" id="userName">Usuário</span>
        </div>
        <button class="btn-logout-premium" onclick="fazerLogout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>

      <a href="../index.html" class="btn-register-premium">Voltar ao Site</a>
    </div>
  </div>
</nav>

<!-- PEDIDOS -->
<section class="perfil-section">
  <div class="perfil-container">
    <div class="perfil-title">
      <h1>Meus Pedidos</h1>
    </div>

    <div class="perfil-card">
      <div id="pedidosList">
        <div style="text-align: center; padding: 40px; color: var(--muted);">
          <div style="font-size: 48px; margin-bottom: 16px;">📦</div>
          <p>Você ainda não tem pedidos.</p>
          <a href="../index.html#produtos" class="btn-primary" style="display: inline-block; margin-top: 16px;">Começar a comprar</a>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // === CONFIGURAÇÃO DO FIREBASE ===
  const firebaseConfig = {
    apiKey: "AIzaSyA7gHgpS2dBrIa2dJamylsg9DUdgOHt3Sk",
    authDomain: "pg-de-vendas.firebaseapp.com",
    databaseURL: "https://pg-de-vendas-default-rtdb.firebaseio.com",
    projectId: "pg-de-vendas",
    storageBucket: "pg-de-vendas.firebasestorage.app",
    messagingSenderId: "803403474499",
    appId: "1:803403474499:web:e729b5b49b75dfa4cd16f6",
    measurementId: "G-5LPWHGFWK5"
  };

  // Inicializa o Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function mostrarToast(msg, tipo = 'sucesso') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast';
    if (tipo === 'erro') t.classList.add('erro');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function formatarData(data) {
    if (!data) return 'Data indisponível';
    const d = new Date(data);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function normalizarStatus(status) {
    if (!status) return 'pendente';
    const s = String(status).toLowerCase().trim();
    if (s === 'concluído' || s === 'concluido') return 'entregue';
    if (s === 'em andamento' || s === 'em_andamento' || s === 'pago' || s === 'processando') return 'em_andamento';
    return s;
  }

  function getStatusCor(status) {
    switch(normalizarStatus(status)) {
      case 'pendente': return '#f59e0b';
      case 'em_andamento': return '#3b82f6';
      case 'enviado': return '#6366f1';
      case 'entregue': return '#10b981';
      case 'cancelado': return '#ef4444';
      default: return '#6c757d';
    }
  }

  function getStatusTexto(status) {
    switch(normalizarStatus(status)) {
      case 'pendente': return 'Pendente';
      case 'em_andamento': return 'Em andamento';
      case 'enviado': return 'Enviado';
      case 'entregue': return 'Entregue';
      case 'cancelado': return 'Cancelado';
      default: return 'Processando';
    }
  }

  async function carregarPedidos() {
    const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (!usuarioLogado) {
      window.location.href = 'login.html';
      return;
    }

    const pedidosListDiv = document.getElementById('pedidosList');

    let pedidos = [];
    if (typeof ZCoreAPI !== 'undefined' && localStorage.getItem('zcore_token')) {
      await ZCoreAPI.init();
      if (ZCoreAPI._online) {
        try {
          pedidos = await ZCoreAPI.getMyOrders();
        } catch (e) {
          console.warn('API pedidos:', e.message);
        }
      }
    }
    if (!pedidos.length && usuarioLogado.pedidos && usuarioLogado.pedidos.length > 0) {
      pedidos = usuarioLogado.pedidos;
    }

    try {
      const snapshot = await db.collection('pedidos').where('usuarioId', '==', usuarioLogado.id.toString()).orderBy('createdAt', 'desc').get();
      if (!snapshot.empty) {
        const pedidosFirestore = snapshot.docs.map(doc => doc.data());
        pedidos = [...pedidosFirestore, ...pedidos.filter(p => !pedidosFirestore.find(pf => pf.id === p.id))];
        pedidos.sort((a, b) => new Date(b.createdAt || b.data) - new Date(a.createdAt || a.data));
      }
    } catch (error) {
      console.error('Erro ao carregar pedidos do Firestore:', error);
    }

    if (pedidos.length === 0) {
      pedidosListDiv.innerHTML = `
        <div style="text-align: center; padding: 40px; color: var(--muted);">
          <div style="font-size: 48px; margin-bottom: 16px;">📦</div>
          <p>Você ainda não tem pedidos.</p>
          <a href="../index.html#produtos" class="btn-primary" style="display: inline-block; margin-top: 16px;">Começar a comprar</a>
        </div>
      `;
      return;
    }

    let html = '';
    pedidos.forEach(pedido => {
      const dataPedido = pedido.createdAt ? pedido.createdAt.toDate ? pedido.createdAt.toDate() : new Date(pedido.createdAt) : new Date(pedido.data);
      html += `
        <div style="border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 16px;">
            <div>
              <div style="font-size: 14px; color: var(--muted); margin-bottom: 4px;">Pedido #${pedido.id}</div>
              <div style="font-size: 13px; color: var(--muted);">${formatarData(dataPedido)}</div>
            </div>
            <div style="text-align: right;">
              <div style="display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: ${getStatusCor(normalizarStatus(pedido.status))}; color: #fff;">
                ${getStatusTexto(normalizarStatus(pedido.status))}
              </div>
            </div>
          </div>
          <div style="border-top: 1px solid var(--border); padding-top: 16px; margin-bottom: 16px;">
            ${(pedido.itens || []).map(item => `
              <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0;">
                <div style="display: flex; align-items: center; gap: 12px;">
                  <span style="font-size: 28px;">${item.emoji || '📦'}</span>
                  <div>
                    <div style="font-weight: 600;">${item.nome}</div>
                    <div style="font-size: 13px; color: var(--muted);">Qtd: ${item.quantidade}</div>
                  </div>
                </div>
                <div style="font-weight: 600;">R$ ${(item.preco * item.quantidade).toLocaleString('pt-BR')}</div>
              </div>
            `).join('')}
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--border);">
            <div style="font-size: 14px; color: var(--muted);">
              ${pedido.endereco ? `Entrega para: ${pedido.endereco.logradouro}, ${pedido.endereco.numero} - ${pedido.endereco.cidade}/${pedido.endereco.uf}` : ''}
            </div>
            <div style="text-align: right;">
              <div style="font-size: 14px; color: var(--muted);">Total</div>
              <div style="font-size: 24px; font-weight: 700;">R$ ${pedido.total.toLocaleString('pt-BR')}</div>
            </div>
          </div>
        </div>
      `;
    });
    pedidosListDiv.innerHTML = html;
  }

  window.onload = function() {
    carregarPedidos();
  };
</script>
<script src="../js/api.js"></script>
<script src="../js/tema.js"></script>
</body>
</html>
