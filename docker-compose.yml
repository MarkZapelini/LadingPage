services:
  api:
    build: 
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=prod-secret-change-me
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
    volumes:
      - ./backend/data:/app/data

  # Opcional: Servir o React frontend separadamente
  frontend-react:
    build:
      context: ./react-frontend
    ports:
      - "5173:5173"
